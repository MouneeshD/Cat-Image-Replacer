<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cat Image Replacer</title>

    <link rel="stylesheet" href="popup.css">

</head>

<body>

    <div class="container">

        <div class="header">

            <div class="logo">🐱</div>

            <h1>Cat Image Replacer</h1>

            <p>Replace every image with a random cat!</p>

        </div>

        <div class="card">

            <h3>Current Website</h3>

            <p id="websiteName">Loading...</p>

        </div>

        <div class="card">

            <h3>Images Found</h3>

            <h2 id="imageCount">0</h2>

        </div>

        <div class="button-group">

            <button id="replaceBtn">
                🐱 Replace Images
            </button>

            <button id="restoreBtn">
                ♻️ Restore Images
            </button>

        </div>

        <div class="status-card">

            <h3>Status</h3>

            <p id="status">Ready</p>

        </div>

        <div class="footer">

            <p>Powered by The Cat API</p>

        </div>

    </div>

    <script src="popup.js"></script>

</body>

</html>
